data:
  waveform_dataset_path: /home/deathstar/dingorep/dingo-T1/01_paper_settings/01_training/01_waveform_dataset/waveform_dataset.hdf5
  train_fraction: 0.909
  window:
    type: tukey
    f_s: 4096
    T: 8.0
    roll_off: 0.4
  detectors:
    - H1
    - L1
    - V1
  extrinsic_prior:
    dec: default
    ra: default
    geocent_time: bilby.core.prior.Uniform(minimum=-0.1, maximum=0.1)
    psi: default
    luminosity_distance: bilby.core.prior.Uniform(minimum=100.0, maximum=6000.0)
  ref_time: 1126259462.391
  inference_parameters:
    - chirp_mass
    - mass_ratio
    - a_1
    - a_2
    - tilt_1
    - tilt_2
    - phi_12
    - phi_jl
    - theta_jn
    - luminosity_distance
    - geocent_time
    - ra
    - dec
    - psi
  tokenization:
    token_size: 16
    drop_detectors:
      p_drop_012_detectors: [0.6, 0.3, 0.1]
      p_drop_hlv:
        H1: 0.3
        L1: 0.3
        V1: 0.4
    drop_frequency_range:
      f_cut:
        p_cut: 0.25
        f_max_lower_cut: 180.
        f_min_upper_cut: 80.
        p_same_cut_all_detectors: 0.7
        p_lower_upper_both: [0.1, 0.7, 0.2]
      mask_interval:
        p_per_detector: 0.1
        f_min: 20.
        f_max: 1800.
        max_width: 10.

model:
  posterior_model_type: normalizing_flow
  posterior_kwargs:
    num_flow_steps: 15 # Reduced from 30 for memory efficiency
    base_transform_kwargs:
      hidden_dim: 256 # Reduced from 512
      num_transform_blocks: 3 # Reduced from 5
      activation: elu
      batch_norm: False
      layer_norm: True
      dropout_probability: 0.0
      num_bins: 8
      base_transform_type: rq-coupling
  embedding_type: transformer
  embedding_kwargs:
    tokenizer_kwargs:
      condition_on_position: True
      hidden_dims: [512]
      activation: elu
      batch_norm: False
      layer_norm: True
    transformer_kwargs:
      d_model: 1024
      dim_feedforward: 2048
      nhead: 16
      dropout: 0.0
      num_layers: 8
      norm_first: True
    pooling: cls
    final_net_kwargs:
      activation: elu
      output_dim: 128
    allow_tf32: False

training:
  stage_0:
    epochs: 20 # Short test run (5-10% of full training)
    asd_dataset_path: /home/deathstar/dingorep/dingo-T1/01_paper_settings/01_training/02_asd_dataset/asds_O3.hdf5
    optimizer:
      type: adamw
      lr: 0.0001
      betas:
        - 0.8
        - 0.99
      weight_decay: 0.005
    scheduler:
      type: reduce_on_plateau
      mode: min
      factor: 0.5
      patience: 5 # Reduced from 10
      update_every_optimizer_step: False
    early_stopping:
      patience: 10 # Reduced from 30
      delta: 0.0
      metric: validation
    automatic_mixed_precision: True
    gradient_updates_per_optimizer_step: 2
    batch_size: 64 # Reduced from 8192 for 16GB RAM, single GPU 🍎

local:
  device: xpu # Intel Arc GPU
  num_workers: 4 # Reduced from 8 for single GPU
  runtime_limits:
    max_time_per_run: 1_000_000
    max_epochs_per_run: 50
  checkpoint_epochs: 10
  copy_waveform_dataset_to_tmp: False # Disable for testing
  local_cache_path: /tmp
  # XPU-specific settings handled in training script
